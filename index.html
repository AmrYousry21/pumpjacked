<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Pumpjacked — 12-Week Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 16px; }
  .app { max-width: 420px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e0ddd5; }
  .logo { font-size: 20px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.5px; }
  .logo span { color: #D85A30; }
  .header-sub { font-size: 12px; color: #888; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: white; border-radius: 12px; padding: 12px 14px; border: 1px solid #e8e5de; }
  .stat-label { font-size: 11px; color: #888; }
  .stat-val { font-size: 24px; font-weight: 600; color: #1a1a1a; margin-top: 2px; }
  .overall-bar-wrap { margin-bottom: 16px; background: white; border-radius: 12px; padding: 12px 14px; border: 1px solid #e8e5de; }
  .overall-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 6px; }
  .overall-bar { height: 6px; background: #ede9e0; border-radius: 3px; }
  .overall-fill { height: 100%; background: #D85A30; border-radius: 3px; transition: width 0.3s; }
  .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .week-nav-btn { width: 34px; height: 34px; border: 1px solid #d0cdc5; border-radius: 10px; background: white; cursor: pointer; font-size: 18px; color: #1a1a1a; display: flex; align-items: center; justify-content: center; }
  .week-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .week-title { font-size: 15px; font-weight: 600; color: #1a1a1a; text-align: center; }
  .week-prog { font-size: 11px; color: #888; text-align: center; margin-top: 2px; }
  .week-dots { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
  .wdot { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #d0cdc5; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #888; background: white; transition: all 0.15s; }
  .wdot.current { border-color: #D85A30; color: #D85A30; }
  .wdot.done { background: #1D9E75; border-color: #1D9E75; color: white; }
  .week-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 14px; }
  .day-pill { padding: 7px 2px; border-radius: 10px; border: 1px solid #e0ddd5; text-align: center; cursor: pointer; background: white; transition: all 0.15s; }
  .day-pill.active { background: #D85A30; border-color: #D85A30; }
  .day-pill.active .dp-label, .day-pill.active .dp-name { color: white; }
  .day-pill.completed .dp-name { color: #1D9E75; }
  .day-pill.off { opacity: 0.4; cursor: default; }
  .dp-label { font-size: 9px; color: #888; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
  .dp-name { font-size: 10px; font-weight: 600; color: #1a1a1a; display: block; margin-top: 1px; }
  .day-card { background: white; border: 1px solid #e8e5de; border-radius: 16px; overflow: hidden; }
  .day-header { padding: 14px 16px 12px; border-bottom: 1px solid #f0ede6; }
  .day-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  .day-subtitle { font-size: 12px; color: #888; margin-top: 3px; }
  .progress-bar { height: 4px; background: #f0ede6; border-radius: 2px; margin-top: 10px; }
  .progress-fill { height: 100%; background: #D85A30; border-radius: 2px; transition: width 0.3s; }
  .prog-row { display: flex; justify-content: space-between; margin-top: 5px; font-size: 11px; color: #888; }
  .section { border-bottom: 1px solid #f0ede6; }
  .section:last-child { border-bottom: none; }
  .section-label { font-size: 10px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.8px; padding: 10px 16px 6px; }
  .exercise-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 16px; border-top: 1px solid #f5f3ee; }
  .ex-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #d0cdc5; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-top: 1px; background: white; transition: all 0.15s; }
  .ex-check.done { background: #1D9E75; border-color: #1D9E75; }
  .ex-check.done::after { content: ''; display: block; width: 5px; height: 9px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
  .ex-body { flex: 1; min-width: 0; }
  .ex-name { font-size: 13px; color: #1a1a1a; line-height: 1.4; }
  .ex-name.done { color: #aaa; text-decoration: line-through; }
  .ex-sets { font-size: 11px; color: #888; margin-top: 2px; }
  .weight-row { display: flex; align-items: center; gap: 6px; margin-top: 7px; flex-wrap: nowrap; }
  .weight-input { width: 72px; padding: 6px 8px; border: 1px solid #d0cdc5; border-radius: 8px; font-size: 13px; font-family: inherit; color: #1a1a1a; background: white; text-align: center; }
  .weight-input:focus { outline: none; border-color: #D85A30; }
  .unit-toggle { display: flex; border: 1px solid #d0cdc5; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .unit-btn { padding: 6px 10px; font-size: 12px; cursor: pointer; background: white; color: #888; border: none; white-space: nowrap; line-height: 1; font-family: inherit; }
  .unit-btn.active { background: #D85A30; color: white; }
  .rpe-wrap { display: flex; align-items: center; gap: 4px; margin-left: auto; flex-shrink: 0; }
  .rpe-label { font-size: 11px; color: #888; }
  .rpe-select { font-size: 12px; padding: 5px 4px; border: 1px solid #d0cdc5; border-radius: 8px; background: white; color: #1a1a1a; font-family: inherit; }
  .last-weight { font-size: 11px; color: #1D9E75; margin-top: 4px; font-weight: 500; }
  .sprint-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 0 16px 12px; }
  .sprint-box { border: 1px solid #e0ddd5; border-radius: 8px; text-align: center; padding: 7px 2px; font-size: 11px; color: #888; cursor: pointer; background: white; transition: all 0.15s; }
  .sprint-box.done { background: #D85A30; border-color: #D85A30; color: white; font-weight: 600; }
  .warmup-item { display: flex; align-items: center; gap: 10px; padding: 6px 16px; border-top: 1px solid #f5f3ee; font-size: 12px; color: #666; }
  .warmup-check { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #d0cdc5; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; background: white; transition: all 0.15s; }
  .warmup-check.done { background: #1D9E75; border-color: #1D9E75; }
  .warmup-check.done::after { content: ''; display: block; width: 4px; height: 7px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
  .note-section { padding: 14px 16px; }
  .note-area { width: 100%; border: 1px solid #e0ddd5; border-radius: 10px; padding: 9px 12px; font-size: 13px; font-family: inherit; color: #1a1a1a; background: white; resize: none; }
  .note-area:focus { outline: none; border-color: #D85A30; }
  .complete-btn { width: 100%; padding: 13px; background: #D85A30; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; font-family: inherit; }
  .complete-btn:disabled { background: #e8e5de; color: #aaa; cursor: default; }
  .unmark-btn { width: 100%; padding: 11px; background: transparent; color: #888; border: 1px solid #d0cdc5; border-radius: 10px; font-size: 13px; cursor: pointer; margin-top: 8px; font-family: inherit; }
  .unmark-btn:hover { border-color: #D85A30; color: #D85A30; }
  .off-card { background: white; border: 1px solid #e8e5de; border-radius: 16px; padding: 36px 20px; text-align: center; }
  .off-title { font-size: 18px; font-weight: 600; color: #1a1a1a; }
  .off-sub { font-size: 13px; color: #888; margin-top: 8px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">PUMP<span>JACKED</span></div>
    <div class="header-sub">12-Week Program</div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total days done</div><div class="stat-val" id="stat-done">0</div></div>
    <div class="stat-card"><div class="stat-label">Program progress</div><div class="stat-val" id="stat-pct">0%</div></div>
  </div>
  <div class="overall-bar-wrap">
    <div class="overall-bar-label"><span id="overall-label">Overall — Week 1 of 12</span><span id="overall-count">0 / 72 days</span></div>
    <div class="overall-bar"><div class="overall-fill" id="overall-fill" style="width:0%"></div></div>
  </div>
  <div class="week-nav">
    <button class="week-nav-btn" id="btn-prev">&#8249;</button>
    <div>
      <div class="week-title" id="week-title">Week 1</div>
      <div class="week-prog" id="week-prog">0 / 6 days</div>
    </div>
    <button class="week-nav-btn" id="btn-next">&#8250;</button>
  </div>
  <div class="week-dots" id="week-dots"></div>
  <div class="week-strip" id="week-strip"></div>
  <div id="day-content"></div>
</div>

<script>
const DAYS_META=[{label:'Mon',name:'Day 1',type:'workout'},{label:'Tue',name:'Day 2',type:'workout'},{label:'Wed',name:'Off',type:'off'},{label:'Thu',name:'Day 3',type:'workout'},{label:'Fri',name:'Day 4',type:'workout'},{label:'Sat',name:'Day 5',type:'workout'},{label:'Sun',name:'Day 6',type:'workout'}];
const WARMUP=['Hamstring Scoops x10yds','Quad Pull w Reach x10yds','Reverse Lunge w Reach x10yds','High Kicks x10yds','Knee Hug to FWD Lunge x10yds','Single Leg RDL x10yds','Single Switches 2x10yds','Double Switches 2x10yds','Triple Switches 2x10yds','Straight Leg Bounds 3x20yds'];
const SPRINTS=['10yds','10yds','10yds','15yds','15yds','15yds','20yds','20yds','20yds','20yds'];
const WORKOUTS={
  0:{title:'Day 1: Sprints + Lower Body',subtitle:'Strength & Power',sections:[{label:'Dynamic warmup',type:'warmup'},{label:'Max effort sprints',type:'sprints'},{label:'Power',exercises:[{name:'Seated Vertical Jump',sets:'3 × 3'},{name:'Seated Broad Jumps',sets:'3 × 3'},{name:'Block Clean',sets:'4 × 3'}]},{label:'Strength',exercises:[{name:'Back Squats',sets:'4 × 8'},{name:'DB Bulgarian Split Squats',sets:'3 × 8'},{name:'Glute Ham Raises',sets:'3 × 8'},{name:'Goblet Lateral Split Squat',sets:'3 × 8'},{name:'Single Leg Calf Raises',sets:'3 × 12'}]}]},
  1:{title:'Day 2: Upper Body',subtitle:'Push & Pull',sections:[{label:'Shoulder prep',exercises:[{name:'DB External Rotations',sets:'2 × 10'},{name:'Prone W-Press',sets:'2 × 10'},{name:'Band Pullaparts',sets:'2 × 15'}]},{label:'Main lifts',exercises:[{name:'Bench Press',sets:'4 × 8'},{name:'Barbell Row',sets:'4 × 8'},{name:'Seated DB Press',sets:'8, 8, 8, 12'},{name:'Single Arm DB Rows',sets:'8, 8, 8, 12'}]},{label:'Accessory',exercises:[{name:'Dips',sets:'3 × 12'},{name:'Lat Pulldowns',sets:'3 × 12'},{name:'DB Lateral Raises',sets:'3 × 12'}]}]},
  3:{title:'Day 3: Arms, Abs & Cardio',subtitle:'Pump + Zone 2',sections:[{label:'Triceps & biceps',exercises:[{name:'EZ Bar Skull Crushers',sets:'3 × 10'},{name:'DB Incline Curls',sets:'3 × 10'},{name:'Cable Pushdowns',sets:'12, 12, MAX'},{name:'Cable Curl',sets:'12, 12, MAX'}]},{label:'Core',exercises:[{name:'Hanging Knee Raises',sets:'3 × 10'},{name:'Zercher Carry/March',sets:'3 × 35s'},{name:'Cable Crunches',sets:'3 × 12'}]},{label:'Conditioning',exercises:[{name:'Zone 2 cardio — bike, incline walk, row, or ski erg',sets:'20–40 min',noWeight:true}]}]},
  4:{title:'Day 4: Sprints + Lower Body',subtitle:'Power & Posterior Chain',sections:[{label:'Dynamic warmup',type:'warmup'},{label:'Max effort sprints',type:'sprints'},{label:'Power',exercises:[{name:'Seated Vertical Jump',sets:'3 × 3'},{name:'Seated Broad Jumps',sets:'3 × 3'},{name:'Power Clean',sets:'3 × 5'}]},{label:'Strength',exercises:[{name:'RDL',sets:'4 × 8'},{name:'Barbell Reverse Lunge',sets:'3 × 8'},{name:'Hamstring Curl variation',sets:'3 × 12'},{name:'Leg Extensions',sets:'3 × 12'},{name:'Seated Calf Raises',sets:'3 × 12'}]}]},
  5:{title:'Day 5: Upper Body',subtitle:'Pull Priority',sections:[{label:'Shoulder prep',exercises:[{name:'DB External Rotations',sets:'2 × 10'},{name:'Prone W-Press',sets:'2 × 10'},{name:'Band Pullaparts',sets:'2 × 15'}]},{label:'Main lifts',exercises:[{name:'Chin-Up / Pull-Up',sets:'4 × 8'},{name:'BB OHP',sets:'4 × 8'},{name:'Incline DB Bench Press',sets:'8, 8, 8, 12'},{name:'Chest Supported Row',sets:'8, 8, 8, 12'}]},{label:'Accessory',exercises:[{name:'Cable Flys',sets:'3 × 12'},{name:'Seated Cable Rows',sets:'3 × 12'},{name:'Seated Shrugs',sets:'3 × 15'}]}]},
  6:{title:'Day 6: Shoulders, Arms, Abs & Cardio',subtitle:'Pump + Tempo Runs',sections:[{label:'Shoulders',exercises:[{name:'DB Lateral Raises',sets:'12, 12, MAX'},{name:'Seated DB Reverse Fly',sets:'12, 12, MAX'}]},{label:'Arms',exercises:[{name:'DB Alternating Curls',sets:'4 × 10'},{name:'Cable French Press',sets:'4 × 10'}]},{label:'Core',exercises:[{name:'Incline Reverse Crunches',sets:'3 × 10'},{name:'AB Rollouts',sets:'3 × 10'}]},{label:'Tempo intervals',exercises:[{name:'15s work / 45s rest × 15 reps — same distance each rep, 60–70% intensity',sets:'15 reps',noWeight:true}]}]}
};

const TOTAL_WEEKS=12;
const WORKOUT_DAYS=[0,1,3,4,5,6];
const STORAGE_KEY='pj_12w_v2';

// Use sessionStorage as fallback if localStorage is blocked
function storageGet(){
  try{ const v=localStorage.getItem(STORAGE_KEY); return v?JSON.parse(v):null; }catch(e){
    try{ const v=sessionStorage.getItem(STORAGE_KEY); return v?JSON.parse(v):null; }catch(e2){ return null; }
  }
}
function storageSave(data){
  const str=JSON.stringify(data);
  try{ localStorage.setItem(STORAGE_KEY,str); }catch(e){
    try{ sessionStorage.setItem(STORAGE_KEY,str); }catch(e2){}
  }
}

let state=storageGet();
if(!state) state={activeWeek:0,activeDay:0,completedDays:{},checked:{},sprints:{},notes:{},weights:{},units:{},lastWeights:{}};
if(!state.lastWeights) state.lastWeights={};

function save(){ storageSave(state); }
function stateKey(w,d){ return w+'_'+d; }
function exKey(si,ei){ return si+'_'+ei; }
function isCompleted(w,d){ return !!(state.completedDays[stateKey(w,d)]); }

function totalEx(dayIdx){
  const wk=WORKOUTS[dayIdx]; if(!wk) return 0;
  let c=0;
  wk.sections.forEach(s=>{ if(s.type==='warmup') c+=WARMUP.length; else if(s.type==='sprints') c+=SPRINTS.length; else c+=s.exercises.length; });
  return c;
}
function doneEx(week,dayIdx){
  const sk=stateKey(week,dayIdx);
  const ch=state.checked[sk]||{}, sp=state.sprints[sk]||{};
  return Object.values(ch).filter(Boolean).length+Object.values(sp).filter(Boolean).length;
}
function totalCompletedDays(){ return Object.values(state.completedDays).filter(Boolean).length; }
function weekCompletedDays(w){ return WORKOUT_DAYS.filter(d=>isCompleted(w,d)).length; }
function isWeekDone(w){ return weekCompletedDays(w)===6; }
function getUnit(w,d,k){ return((state.units[stateKey(w,d)])||{})[k]||'lbs'; }
function getWeight(w,d,k){ return((state.weights[stateKey(w,d)])||{})[k]||''; }
function getRPE(w,d,k){ return((state.weights[stateKey(w,d)])||{})[k+'_rpe']||''; }
function getLastWeight(dayIdx,k){ return(state.lastWeights['d'+dayIdx]||{})[k]||null; }

function setWeight(w,d,k,val){
  const sk=stateKey(w,d);
  if(!state.weights[sk]) state.weights[sk]={};
  state.weights[sk][k]=val;
  if(val){ if(!state.lastWeights['d'+d]) state.lastWeights['d'+d]={}; state.lastWeights['d'+d][k]=val+' '+getUnit(w,d,k); }
  save();
}
function setUnit(w,d,k,val){
  const sk=stateKey(w,d);
  if(!state.units[sk]) state.units[sk]={};
  state.units[sk][k]=val; save();
}
function setRPE(w,d,k,val){
  const sk=stateKey(w,d);
  if(!state.weights[sk]) state.weights[sk]={};
  state.weights[sk][k+'_rpe']=val; save();
}

function updateStats(){
  const total=totalCompletedDays();
  document.getElementById('stat-done').textContent=total;
  document.getElementById('stat-pct').textContent=Math.round((total/72)*100)+'%';
  document.getElementById('overall-label').textContent='Overall — Week '+(state.activeWeek+1)+' of 12';
  document.getElementById('overall-count').textContent=total+' / 72 days';
  document.getElementById('overall-fill').style.width=Math.round((total/72)*100)+'%';
  document.getElementById('week-title').textContent='Week '+(state.activeWeek+1);
  document.getElementById('week-prog').textContent=weekCompletedDays(state.activeWeek)+' / 6 days';
  document.getElementById('btn-prev').disabled=state.activeWeek===0;
  document.getElementById('btn-next').disabled=state.activeWeek===TOTAL_WEEKS-1;
}

function renderDots(){
  const el=document.getElementById('week-dots'); el.innerHTML='';
  for(let w=0;w<TOTAL_WEEKS;w++){
    const dot=document.createElement('div');
    dot.className='wdot'+(w===state.activeWeek?' current':'')+(isWeekDone(w)?' done':'');
    dot.textContent=w+1;
    dot.onclick=()=>{ state.activeWeek=w; state.activeDay=WORKOUT_DAYS[0]; save(); render(); };
    el.appendChild(dot);
  }
}

function renderStrip(){
  const strip=document.getElementById('week-strip'); strip.innerHTML='';
  DAYS_META.forEach((d,i)=>{
    const div=document.createElement('div');
    const comp=isCompleted(state.activeWeek,i);
    div.className='day-pill'+(i===state.activeDay?' active':'')+(d.type==='off'?' off':'')+(comp?' completed':'');
    div.innerHTML=`<span class="dp-label">${d.label}</span><span class="dp-name">${d.name}</span>`;
    if(d.type!=='off') div.onclick=()=>{ state.activeDay=i; save(); render(); };
    strip.appendChild(div);
  });
}

function renderDay(){
  const week=state.activeWeek, idx=state.activeDay, day=DAYS_META[idx], content=document.getElementById('day-content');
  if(day.type==='off'){
    content.innerHTML=`<div class="off-card"><div class="off-title">Rest day</div><div class="off-sub">Recovery is part of the program. Eat well, sleep well.</div></div>`;
    return;
  }
  const w=WORKOUTS[idx]; if(!w) return;
  const sk=stateKey(week,idx);
  if(!state.checked[sk]) state.checked[sk]={};
  if(!state.sprints[sk]) state.sprints[sk]={};
  const total=totalEx(idx), done=doneEx(week,idx), pct=total>0?Math.round((done/total)*100):0;
  const isComp=isCompleted(week,idx);

  let html=`<div class="day-card">
    <div class="day-header">
      <div class="day-title">${w.title}</div>
      <div class="day-subtitle">Week ${week+1} &middot; ${w.subtitle}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="prog-row"><span>${done}/${total} exercises</span><span>${pct}%</span></div>
    </div>`;

  w.sections.forEach((sec,si)=>{
    html+=`<div class="section"><div class="section-label">${sec.label}</div>`;
    if(sec.type==='warmup'){
      WARMUP.forEach((item,ii)=>{
        const k='w'+ii, d=state.checked[sk][k];
        html+=`<div class="warmup-item"><div class="warmup-check${d?' done':''}" data-type="warmup" data-key="${k}"></div><span style="${d?'text-decoration:line-through;color:#aaa':''}">${item}</span></div>`;
      });
    } else if(sec.type==='sprints'){
      html+=`<div class="sprint-grid">`;
      SPRINTS.forEach((yds,ii)=>{ const d=state.sprints[sk][ii]; html+=`<div class="sprint-box${d?' done':''}" data-type="sprint" data-sprint="${ii}">${yds}</div>`; });
      html+=`</div>`;
    } else {
      sec.exercises.forEach((ex,ei)=>{
        const k=exKey(si,ei), checked=state.checked[sk][k];
        const unit=getUnit(week,idx,k), weight=getWeight(week,idx,k), rpe=getRPE(week,idx,k);
        const lastW=getLastWeight(idx,k);
        const placeholder=lastW?lastW:'Weight';
        html+=`<div class="exercise-row">
          <div class="ex-check${checked?' done':''}" data-type="ex" data-key="${k}"></div>
          <div class="ex-body">
            <div class="ex-name${checked?' done':''}">${ex.name}</div>
            <div class="ex-sets">${ex.sets}</div>
            ${ex.noWeight?'':`<div class="weight-row">
              <input class="weight-input" type="number" min="0" step="2.5" placeholder="${placeholder}" value="${weight}" data-key="${k}" />
              <div class="unit-toggle">
                <div class="unit-btn${unit==='lbs'?' active':''}" data-key="${k}" data-unit="lbs">lbs</div>
                <div class="unit-btn${unit==='kg'?' active':''}" data-key="${k}" data-unit="kg">kg</div>
              </div>
              <div class="rpe-wrap">
                <span class="rpe-label">RPE</span>
                <select class="rpe-select" data-key="${k}">
                  <option value="">—</option>
                  ${[6,7,7.5,8,8.5,9,9.5,10].map(r=>`<option value="${r}"${rpe==r?' selected':''}>${r}</option>`).join('')}
                </select>
              </div>
            </div>
            ${lastW&&!weight?`<div class="last-weight">Last time: ${lastW}</div>`:''}`}
          </div>
        </div>`;
      });
    }
    html+=`</div>`;
  });

  html+=`<div class="note-section">
    <div class="section-label" style="padding:0 0 8px;">Session notes</div>
    <textarea class="note-area" rows="2" placeholder="Log how you felt, PRs hit, etc.">${state.notes[sk]||''}</textarea>
    ${isComp
      ? `<button class="complete-btn" disabled>Workout logged ✓</button><button class="unmark-btn" id="unmark-btn">Unmark as complete</button>`
      : `<button class="complete-btn" id="complete-btn">Mark workout complete</button>`
    }
  </div></div>`;

  content.innerHTML=html;

  content.querySelectorAll('[data-type="ex"]').forEach(el=>{ el.onclick=()=>{ state.checked[sk][el.dataset.key]=!state.checked[sk][el.dataset.key]; save(); render(); }; });
  content.querySelectorAll('[data-type="warmup"]').forEach(el=>{ el.onclick=()=>{ state.checked[sk][el.dataset.key]=!state.checked[sk][el.dataset.key]; save(); render(); }; });
  content.querySelectorAll('[data-type="sprint"]').forEach(el=>{ el.onclick=()=>{ const ii=+el.dataset.sprint; state.sprints[sk][ii]=!state.sprints[sk][ii]; save(); render(); }; });
  content.querySelectorAll('.weight-input').forEach(el=>{ el.oninput=()=>setWeight(week,idx,el.dataset.key,el.value); });
  content.querySelectorAll('.unit-btn').forEach(el=>{ el.onclick=()=>{ setUnit(week,idx,el.dataset.key,el.dataset.unit); render(); }; });
  content.querySelectorAll('.rpe-select').forEach(el=>{ el.onchange=()=>setRPE(week,idx,el.dataset.key,el.value); });
  const note=content.querySelector('.note-area');
  if(note) note.onchange=e=>{ state.notes[sk]=e.target.value; save(); };
  const completeBtn=document.getElementById('complete-btn');
  if(completeBtn) completeBtn.onclick=()=>{ state.completedDays[sk]=true; save(); render(); };
  const unmarkBtn=document.getElementById('unmark-btn');
  if(unmarkBtn) unmarkBtn.onclick=()=>{ delete state.completedDays[sk]; save(); render(); };
}

document.getElementById('btn-prev').onclick=()=>{ if(state.activeWeek>0){ state.activeWeek--; state.activeDay=WORKOUT_DAYS[0]; save(); render(); } };
document.getElementById('btn-next').onclick=()=>{ if(state.activeWeek<TOTAL_WEEKS-1){ state.activeWeek++; state.activeDay=WORKOUT_DAYS[0]; save(); render(); } };

function render(){ updateStats(); renderDots(); renderStrip(); renderDay(); }
render();
</script>
</body>
</html>
